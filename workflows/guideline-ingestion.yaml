name: Guideline Document Ingestion
description: >
  Ingests a single guideline document from Azure Blob Storage into the vector store.
  Downloads the file, OCRs it with Azure Document Intelligence, splits into chunks,
  generates embeddings, and stores vectors with metadata for citation support.
  Run once per document.
version: 1.0.0
category: knowledge-center
domain: general
tags:
- compliance
- guidelines
workflow_type: graph
config: {}
limits: null
triggers: []
steps:
- id: download_file
  name: Download Document
  type: tool
  agent_name: null
  agent_config: null
  tool:
    type: connection
    connection_name: '{{workflow.input.connection_name}}'
    tool_name: download_file
    connection_scope: null
  component: null
  workflow_name: null
  input:
    blob_name: '{{workflow.input.blob_name}}'
    workflow_run_id: '{{workflow.execution_id}}'
  dependencies: []
  routes: []
  batch: null
  for_each: null
  steps: []
  aggregate: {}
  config:
    retry:
      max_attempts: 3
      backoff: exponential
      initial_delay: 1.0
  properties: null
- id: ocr_document
  name: OCR Document
  type: tool
  agent_name: null
  agent_config: null
  tool:
    type: connection
    connector: azure_doc_intel
    connection_name: __mi_azure_doc_intel
    tool_name: extract_layout_with_chunks
    connection_scope: null
  component: null
  workflow_name: null
  input:
    document: '{{steps.download_file.output.content}}'
    workflow_run_id: '{{workflow.execution_id}}'
    use_intermediate_storage: true
  dependencies:
  - download_file
  routes: []
  batch: null
  for_each: null
  steps: []
  aggregate: {}
  config:
    on_error: continue
  properties: null
- id: split_text
  name: Split Text Chunks
  type: component
  agent_name: null
  agent_config: null
  tool: null
  component: text_splitter
  workflow_name: null
  input: null
  dependencies:
  - ocr_document
  routes: []
  batch: null
  for_each: null
  steps: []
  aggregate: {}
  config:
    text: "{{steps.ocr_document.output.page_contents | join('\n\n')}}"
    source: '{{workflow.input.blob_name}}'
    chunk_size: '{{workflow.input.chunk_size}}'
    chunk_overlap: '{{workflow.input.chunk_overlap}}'
    use_intermediate_storage: true
  properties: null
- id: generate_embeddings
  name: Generate Embeddings
  type: component
  agent_name: null
  agent_config: null
  tool: null
  component: batch_embedder
  workflow_name: null
  input: null
  dependencies:
  - split_text
  routes: []
  batch: null
  for_each: null
  steps: []
  aggregate: {}
  config:
    texts: '{{steps.split_text.output.chunks}}'
    provider: '{{workflow.input.embedding_provider}}'
    model: '{{workflow.input.embedding_model}}'
    use_intermediate_storage: true
    workflow_run_id: '{{workflow.execution_id}}'
  properties: null
- id: build_documents
  name: Build Vector Documents
  type: component
  agent_name: null
  agent_config: null
  tool: null
  component: document_builder
  workflow_name: null
  input: null
  dependencies:
  - split_text
  - generate_embeddings
  - ocr_document
  routes: []
  batch: null
  for_each: null
  steps: []
  aggregate: {}
  config:
    chunks: '{{steps.split_text.output.chunks}}'
    embeddings: '{{steps.generate_embeddings.output}}'
    source: '{{workflow.input.blob_name}}'
    use_intermediate_storage: true
    workflow_run_id: '{{workflow.execution_id}}'
    metadata:
      file_hash: "{{steps.ocr_document.output.file_hash | default('')}}"
      total_pages: "{{steps.ocr_document.output.page_contents | length}}"
  properties: null
- id: store_vectors
  name: Store Vectors
  type: tool
  agent_name: null
  agent_config: null
  tool:
    type: connection
    connector: vector_store
    tool_name: upsert_documents
    connection_scope: null
  component: null
  workflow_name: null
  input:
    collection_name: '{{workflow.input.collection_name}}'
    documents: '{{steps.build_documents.output.documents}}'
    use_intermediate_storage: true
    workflow_run_id: '{{workflow.execution_id}}'
  dependencies:
  - build_documents
  routes: []
  batch: null
  for_each: null
  steps: []
  aggregate: {}
  config: {}
  properties: null
- id: final_output
  name: Pipeline Summary
  type: output
  agent_name: null
  agent_config: null
  tool: null
  component: null
  workflow_name: null
  input:
    blob_name: '{{workflow.input.blob_name}}'
    status: completed
    chunks_created: "{{steps.split_text.output.chunks | length}}"
    vectors_stored: true
  dependencies:
  - store_vectors
  routes: []
  batch: null
  for_each: null
  steps: []
  aggregate: {}
  config: {}
  properties: null
edges: []
variables: {}
inputs:
  connection_name:
    type: string
    description: Azure Blob Storage connection name
    required: true
  blob_name:
    type: string
    description: Full blob path (e.g., uploads/my-policy.docx)
    required: true
  collection_name:
    type: string
    description: Vector store collection name
    default: company-guidelines
  embedding_provider:
    type: string
    description: Embedding provider
    default: ''
  embedding_model:
    type: string
    description: Embedding model
    default: ''
  chunk_size:
    type: integer
    default: 1000
    description: Max characters per chunk
  chunk_overlap:
    type: integer
    default: 200
    description: Overlap between chunks
outputs: {}
ui_metadata: {}
